name: Validate

on:
  push:
  pull_request:
  release:
    types: [published]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    name: HACS
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: integration
          # No `ignore` here: the HACS brands check is satisfied locally by
          # custom_components/nuki_otp/brand/icon.png (HA 2026.3+ custom-
          # integration local brands). home-assistant/brands no longer accepts
          # custom-integration icons, so there is no upstream brand to register.
          # See SUBMISSION.md.

  validate-hassfest:
    name: Hassfest
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: Hassfest validation
        uses: "home-assistant/actions/hassfest@master"
